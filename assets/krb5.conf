# Kerberos client defaults bundled for the VS Code Flatpak.
# Why this exists:
# - Provides predictable Kerberos behavior inside the sandbox.
# - Supports enterprise SSO/auth scenarios that depend on Kerberos tickets.
# - Avoids relying on host-specific kerberos defaults that may be unavailable in-container.

[libdefaults]
    dns_lookup_realm = false
    ticket_lifetime = 24h
    renew_lifetime = 7d
    forwardable = true
    rdns = false
    pkinit_anchors = FILE:/etc/ssl/certs/ca-certificates.crt
    spake_preauth_groups = edwards25519
    default_ccache_name = KCM:

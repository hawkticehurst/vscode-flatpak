name: Build VS Code Flatpak

on:
  workflow_dispatch:
    inputs:
      channel:
        description: "VS Code channel"
        required: true
        default: "stable"
        type: choice
        options:
          - stable
          - insider

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install Flatpak & Builder
        run: |
          sudo apt update
          sudo apt install -y flatpak flatpak-builder curl tar

      - name: Add Flathub and install SDK
        run: |
          sudo flatpak remote-add --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo
          sudo flatpak install -y flathub \
            org.freedesktop.Sdk//25.08 \
            org.electronjs.Electron2.BaseApp//25.08

      - name: Resolve latest VS Code version
        id: version
        run: |
          CHANNEL="${{ github.event.inputs.channel }}"
          if [ "${CHANNEL}" = "stable" ]; then
            VERSION=$(curl -s https://api.github.com/repos/microsoft/vscode/releases/latest | grep '"tag_name"' | cut -d'"' -f4)
          else
            # For insider, query the insider releases (pre-releases)
            VERSION=$(curl -s https://api.github.com/repos/microsoft/vscode/releases | grep '"tag_name"' | head -1 | cut -d'"' -f4)
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "channel=$CHANNEL" >> $GITHUB_OUTPUT
          echo "Resolved VS Code version: $VERSION (channel: $CHANNEL)"

      - name: Download VS Code and calculate checksum
        id: checksum
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          CHANNEL="${{ steps.version.outputs.channel }}"
          # Use a version-pinned URL so the download is deterministic.
          # The /latest/ URL is non-deterministic and can change between requests,
          # causing checksum mismatches when flatpak-builder re-downloads.
          DOWNLOAD_URL="https://update.code.visualstudio.com/${VERSION}/linux-x64/${CHANNEL}"
          echo "Downloading VS Code from: ${DOWNLOAD_URL}"
          curl -L --fail -o /tmp/vscode.tar.gz "${DOWNLOAD_URL}"
          if [ ! -s /tmp/vscode.tar.gz ]; then
            echo "Error: Download failed or file is empty"
            exit 1
          fi
          SHA=$(sha256sum /tmp/vscode.tar.gz | awk '{print $1}')
          echo "sha=$SHA" >> $GITHUB_OUTPUT
          echo "url=$DOWNLOAD_URL" >> $GITHUB_OUTPUT
          echo "Calculated checksum: $SHA"

      - name: Patch Flatpak manifest with version, URL, and checksum
        run: |
          # Replace the /latest/ URL with the pinned version URL
          sed -i \
            "s|url: https://update.code.visualstudio.com/latest/linux-x64/stable|url: ${{ steps.checksum.outputs.url }}|" \
            com.visualstudio.code.yaml
          # Replace the placeholder checksum
          sed -i \
            "s|sha256: PLACEHOLDER|sha256: ${{ steps.checksum.outputs.sha }}|" \
            com.visualstudio.code.yaml
          echo "Updated manifest:"
          grep -E 'url:|sha256:' com.visualstudio.code.yaml | head -4

      - name: Build Flatpak
        run: |
          mkdir -p build-dir repo
          flatpak-builder \
            --force-clean \
            --repo=repo \
            build-dir \
            com.visualstudio.code.yaml

      - name: Export Flatpak bundle
        run: |
          flatpak build-bundle repo vscode.flatpak com.visualstudio.code
          ls -lh vscode.flatpak

      - name: Upload Flatpak artifact
        uses: actions/upload-artifact@v4
        with:
          name: vscode-flatpak
          path: vscode.flatpak

name: Build VS Code Flatpak

on:
  workflow_dispatch:
    inputs:
      channel:
        description: 'VS Code channel (stable or insiders)'
        required: true
        default: 'stable'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install Flatpak & Builder
        run: |
          sudo apt update
          sudo apt install -y flatpak flatpak-builder curl tar

      - name: Add Flathub and install SDK
        run: |
          sudo flatpak remote-add --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo
          sudo flatpak install -y flathub \
            org.freedesktop.Platform//23.08 \
            org.freedesktop.Sdk//23.08

      - name: Resolve Flatpak sources and checksum
        run: |
          mkdir -p build-dir
          flatpak-builder \
            --download-only \
            build-dir \
            com.visualstudio.code.yaml

      - name: Extract resolved checksum
        run: |
          SHA=$(jq -r '.sources[0].sha256' build-dir/.flatpak-builder/metadata.json)
          sed -i "s|sha256:.*|sha256: $SHA|" com.visualstudio.code.yaml


      - name: Patch Flatpak manifest
        run: |
          sed -i \
            "s|sha256:.*|sha256: ${{ steps.checksum.outputs.sha }}|" \
            com.visualstudio.code.yaml

      - name: Build Flatpak
        run: |
          mkdir -p build-dir repo
          flatpak-builder \
            --force-clean \
            --repo=repo \
            build-dir \
            com.visualstudio.code.yaml

      - name: Export Flatpak bundle
        run: |
          flatpak build-bundle repo vscode.flatpak com.visualstudio.code
          ls -lh vscode.flatpak

      - name: Upload Flatpak artifact
        uses: actions/upload-artifact@v4
        with:
          name: vscode-flatpak
          path: vscode.flatpak

name: Build VS Code Flatpak

on:
  workflow_dispatch:
    inputs:
      channel:
        description: "VS Code channel"
        required: true
        default: "stable"
        type: choice
        options:
          - stable
          - insider

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install Flatpak & Builder
        run: |
          sudo apt update
          sudo apt install -y flatpak flatpak-builder curl tar

      - name: Add Flathub and install SDK
        run: |
          sudo flatpak remote-add --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo
          sudo flatpak install -y flathub \
            org.freedesktop.Sdk//25.08 \
            org.electronjs.Electron2.BaseApp//25.08

      - name: Download VS Code and calculate checksum
        id: checksum
        run: |
          CHANNEL="${{ github.event.inputs.channel }}"
          echo "Downloading VS Code (channel: ${CHANNEL})"
          curl -L --fail -o /tmp/vscode.tar.gz "https://update.code.visualstudio.com/latest/linux-x64/${CHANNEL}"
          # Verify the download succeeded
          if [ ! -s /tmp/vscode.tar.gz ]; then
            echo "Error: Download failed or file is empty"
            exit 1
          fi
          # Calculate SHA256 checksum
          SHA=$(sha256sum /tmp/vscode.tar.gz | awk '{print $1}')
          echo "sha=$SHA" >> $GITHUB_OUTPUT
          echo "Calculated checksum: $SHA"
          # Place the archive into flatpak-builder's download cache keyed by sha256.
          # This prevents flatpak-builder from re-downloading from the non-deterministic
          # /latest/ URL, which can return a different version between requests.
          mkdir -p .flatpak-builder/downloads
          cp /tmp/vscode.tar.gz ".flatpak-builder/downloads/${SHA}"

      - name: Patch Flatpak manifest with checksum
        run: |
          sed -i \
            "s|sha256: PLACEHOLDER|sha256: ${{ steps.checksum.outputs.sha }}|" \
            com.visualstudio.code.yaml
          echo "Updated manifest:"
          grep sha256 com.visualstudio.code.yaml

      - name: Build Flatpak
        run: |
          mkdir -p build-dir repo
          flatpak-builder \
            --force-clean \
            --repo=repo \
            build-dir \
            com.visualstudio.code.yaml

      - name: Export Flatpak bundle
        run: |
          flatpak build-bundle repo vscode.flatpak com.visualstudio.code
          ls -lh vscode.flatpak

      - name: Upload Flatpak artifact
        uses: actions/upload-artifact@v4
        with:
          name: vscode-flatpak
          path: vscode.flatpak

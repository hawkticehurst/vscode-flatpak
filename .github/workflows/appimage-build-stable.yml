name: Build VS Code AppImage (Stable)

on:
  workflow_dispatch:
  schedule:
    # Run every 6 hours to check upstream for a new Stable archive.
    # The workflow only builds when a new upstream SHA is detected.
    - cron: "0 */6 * * *"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Install AppImage build dependencies
        run: |
          sudo apt update
          sudo apt install -y curl tar desktop-file-utils

      - name: Resolve VS Code archive and decide whether to build
        id: check
        run: |
          bash scripts/resolve-vscode-release.sh \
            stable \
            vscode-appimage-stable-sha \
            "$GITHUB_OUTPUT" \
            "${{ github.event_name }}"

      - name: Skip build (no new Stable archive)
        if: steps.check.outputs.should_build != 'true'
        run: echo "No new Stable archive detected. Skipping build steps."

      - name: Build AppImage
        if: steps.check.outputs.should_build == 'true'
        run: |
          bash scripts/build-appimage.sh \
            stable \
            "${{ steps.check.outputs.url }}" \
            "${{ steps.check.outputs.version }}" \
            "vscode-appimage-stable.AppImage"
          ls -lh vscode-appimage-stable.AppImage

      - name: Upload AppImage artifact
        if: steps.check.outputs.should_build == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: vscode-appimage-stable
          path: vscode-appimage-stable.AppImage

      - name: Tag processed Stable archive
        if: steps.check.outputs.build_needed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.check.outputs.tag }}"
          git push origin "refs/tags/${{ steps.check.outputs.tag }}" || true

      - name: Create GitHub release (Stable AppImage)
        if: steps.check.outputs.build_needed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ steps.check.outputs.tag }}" \
            "vscode-appimage-stable.AppImage" \
            --title "VS Code Stable AppImage v${{ steps.check.outputs.version }}" \
            --notes "Automated AppImage build for VS Code Stable v${{ steps.check.outputs.version }} (SHA ${{ steps.check.outputs.sha }})."

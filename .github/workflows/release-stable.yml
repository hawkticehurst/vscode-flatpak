name: Build VS Code Stable Release

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-stable
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Install build dependencies
        run: |
          sudo apt update
          sudo apt install -y curl tar desktop-file-utils flatpak flatpak-builder

      - name: Add Flathub and install SDK
        run: |
          sudo flatpak remote-add --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo
          sudo flatpak install -y flathub \
            org.freedesktop.Sdk//25.08 \
            org.electronjs.Electron2.BaseApp//25.08

      - name: Resolve Stable archive
        id: stable
        run: |
          bash scripts/resolve-vscode-release.sh \
            stable \
            vscode-stable-sha \
            "$GITHUB_OUTPUT" \
            "${{ github.event_name }}"

      - name: Build Stable Flatpak
        run: |
          bash scripts/build-flatpak.sh \
            stable \
            "${{ steps.stable.outputs.url }}" \
            "${{ steps.stable.outputs.sha }}" \
            release/vscode-flatpak-stable.flatpak

      - name: Build Stable AppImage
        run: |
          bash scripts/build-appimage.sh \
            stable \
            "${{ steps.stable.outputs.url }}" \
            "${{ steps.stable.outputs.version }}" \
            release/vscode-appimage-stable.AppImage

      - name: Prepare release metadata
        id: release_meta
        run: |
          sanitize() {
            printf '%s' "$1" | tr -cs '[:alnum:]._-' '-'
          }

          version='${{ steps.stable.outputs.version }}'
          sha='${{ steps.stable.outputs.sha }}'
          release_tag="vscode-stable-$(sanitize "${version}")-${sha:0:7}"
          release_title="VS Code Stable v${version}"

          {
            echo "tag=${release_tag}"
            echo "title=${release_title}"
            echo 'notes<<EOF'
            echo "Manual release containing the latest VS Code Stable Flatpak and AppImage builds."
            echo
            echo "Stable version: ${version}"
            echo "Stable SHA: ${sha}"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "${{ steps.release_meta.outputs.tag }}" >/dev/null 2>&1; then
            gh release upload "${{ steps.release_meta.outputs.tag }}" \
              release/vscode-flatpak-stable.flatpak \
              release/vscode-appimage-stable.AppImage \
              --clobber
            gh release edit "${{ steps.release_meta.outputs.tag }}" \
              --title "${{ steps.release_meta.outputs.title }}" \
              --notes "${{ steps.release_meta.outputs.notes }}"
          else
            gh release create "${{ steps.release_meta.outputs.tag }}" \
              release/vscode-flatpak-stable.flatpak \
              release/vscode-appimage-stable.AppImage \
              --title "${{ steps.release_meta.outputs.title }}" \
              --notes "${{ steps.release_meta.outputs.notes }}"
          fi

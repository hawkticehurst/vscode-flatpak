name: Build VS Code Flatpak (Insiders)

on:
  workflow_dispatch:
  schedule:
    # Run every 6 hours to check upstream for a new Insiders archive.
    # The workflow only builds when a new upstream SHA is detected.
    - cron: "0 */6 * * *"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Install Flatpak & Builder
        run: |
          sudo apt update
          sudo apt install -y flatpak flatpak-builder curl tar

      - name: Add Flathub and install SDK
        run: |
          sudo flatpak remote-add --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo
          sudo flatpak install -y flathub \
            org.freedesktop.Sdk//25.08 \
            org.electronjs.Electron2.BaseApp//25.08

      - name: Resolve VS Code Insiders archive and decide whether to build
        id: check
        run: |
          CHANNEL="insider"
          TAG_PREFIX="vscode-insiders-sha"

          # Resolve the final CDN URL from the /latest/ redirect.
          # We use the resolved CDN URL in the manifest so flatpak-builder
          # downloads from a stable, deterministic URL (not /latest/ which
          # can change between requests causing checksum mismatches).
          CDN_URL=$(curl -sIL -o /dev/null -w '%{url_effective}' "https://update.code.visualstudio.com/latest/linux-x64/${CHANNEL}")
          echo "Resolved CDN URL: ${CDN_URL}"
          curl -L --fail -o /tmp/vscode-insiders.tar.gz "${CDN_URL}"
          if [ ! -s /tmp/vscode-insiders.tar.gz ]; then
            echo "Error: Download failed or file is empty"
            exit 1
          fi

          SHA=$(sha256sum /tmp/vscode-insiders.tar.gz | awk '{print $1}')

          PACKAGE_JSON_PATH=$(tar -tzf /tmp/vscode-insiders.tar.gz | grep -m1 'resources/app/package.json$' || true)
          VERSION=""
          if [ -n "$PACKAGE_JSON_PATH" ]; then
            VERSION=$(tar -xOf /tmp/vscode-insiders.tar.gz "$PACKAGE_JSON_PATH" | sed -n 's/^[[:space:]]*"version":[[:space:]]*"\([^"]*\)".*/\1/p' | head -1)
          fi
          if [ -z "$VERSION" ]; then
            VERSION="unknown"
          fi

          TAG="${TAG_PREFIX}-${SHA:0:12}"

          if git rev-parse -q --verify "refs/tags/${TAG}" >/dev/null; then
            BUILD_NEEDED=false
          else
            BUILD_NEEDED=true
          fi

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            SHOULD_BUILD=true
          else
            SHOULD_BUILD="${BUILD_NEEDED}"
          fi

          echo "sha=$SHA" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "url=$CDN_URL" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "build_needed=$BUILD_NEEDED" >> "$GITHUB_OUTPUT"
          echo "should_build=$SHOULD_BUILD" >> "$GITHUB_OUTPUT"

          echo "Calculated checksum: $SHA"
          echo "Detected VS Code version: $VERSION"
          echo "Build needed (new upstream): $BUILD_NEEDED"
          echo "Should build in this run: $SHOULD_BUILD"

      - name: Skip build (no new Insiders archive)
        if: steps.check.outputs.should_build != 'true'
        run: echo "No new Insiders archive detected. Skipping build steps."

      - name: Patch Flatpak manifest with resolved URL and checksum
        if: steps.check.outputs.should_build == 'true'
        run: |
          MANIFEST="flatpak/insiders/com.visualstudio.code.insiders.yaml"
          # Replace the placeholder URL with the resolved CDN URL
          sed -i \
            "s|url: PLACEHOLDER_URL|url: ${{ steps.check.outputs.url }}|" \
            "$MANIFEST"
          # Replace the placeholder checksum
          sed -i \
            "s|sha256: PLACEHOLDER|sha256: ${{ steps.check.outputs.sha }}|" \
            "$MANIFEST"
          echo "Updated manifest:"
          grep -E 'url:|sha256:' "$MANIFEST" | head -4

      - name: Build Flatpak
        if: steps.check.outputs.should_build == 'true'
        run: |
          mkdir -p build-dir repo
          flatpak-builder \
            --force-clean \
            --repo=repo \
            build-dir \
            flatpak/insiders/com.visualstudio.code.insiders.yaml

      - name: Export Flatpak bundle
        if: steps.check.outputs.should_build == 'true'
        run: |
          flatpak build-bundle repo vscode-flatpak-insider.flatpak com.visualstudio.code.insiders
          ls -lh vscode-flatpak-insider.flatpak

      - name: Upload Flatpak artifact
        if: steps.check.outputs.should_build == 'true'
        uses: actions/upload-artifact@v6
        with:
          name: vscode-flatpak-insider
          path: vscode-flatpak-insider.flatpak

      - name: Tag processed Insiders archive
        if: steps.check.outputs.build_needed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.check.outputs.tag }}"
          git push origin "refs/tags/${{ steps.check.outputs.tag }}" || true

      - name: Create GitHub release (Insiders)
        if: steps.check.outputs.build_needed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ steps.check.outputs.tag }}" \
            "vscode-flatpak-insider.flatpak" \
            --title "VS Code Insiders v${{ steps.check.outputs.version }}" \
            --notes "Automated flatpak build for VS Code Insiders v${{ steps.check.outputs.version }} (SHA ${{ steps.check.outputs.sha }})."

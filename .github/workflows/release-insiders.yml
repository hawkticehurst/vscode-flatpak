name: Build VS Code Insiders Release

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */12 * * *"

permissions:
  contents: write

concurrency:
  group: release-insiders
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Install build dependencies
        run: |
          sudo apt update
          sudo apt install -y curl tar desktop-file-utils flatpak flatpak-builder

      - name: Add Flathub and install SDK
        run: |
          sudo flatpak remote-add --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo
          sudo flatpak install -y flathub \
            org.freedesktop.Sdk//25.08 \
            org.electronjs.Electron2.BaseApp//25.08

      - name: Resolve Insiders archive
        id: insiders
        run: |
          bash scripts/resolve-vscode-release.sh \
            insiders \
            vscode-insiders-sha \
            "$GITHUB_OUTPUT" \
            "${{ github.event_name }}"

      - name: Skip build
        if: steps.insiders.outputs.should_build != 'true'
        run: echo "No new Insiders archive detected. Skipping build steps."

      - name: Build Insiders Flatpak
        if: steps.insiders.outputs.should_build == 'true'
        run: |
          bash scripts/build-flatpak.sh \
            insiders \
            "${{ steps.insiders.outputs.url }}" \
            "${{ steps.insiders.outputs.sha }}" \
            release/vscode-flatpak-insider.flatpak

      - name: Build Insiders AppImage
        if: steps.insiders.outputs.should_build == 'true'
        run: |
          bash scripts/build-appimage.sh \
            insiders \
            "${{ steps.insiders.outputs.url }}" \
            "${{ steps.insiders.outputs.version }}" \
            release/vscode-appimage-insiders.AppImage

      - name: Tag processed Insiders archive
        if: steps.insiders.outputs.build_needed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.insiders.outputs.tag }}"
          git push origin "refs/tags/${{ steps.insiders.outputs.tag }}"

      - name: Prepare release metadata
        if: steps.insiders.outputs.should_build == 'true'
        id: release_meta
        run: |
          sanitize() {
            printf '%s' "$1" | tr -cs '[:alnum:]._-' '-'
          }

          version='${{ steps.insiders.outputs.version }}'
          sha='${{ steps.insiders.outputs.sha }}'
          release_tag="vscode-insiders-$(sanitize "${version}")-${sha:0:7}"
          release_title="VS Code Insiders v${version}"

          {
            echo "tag=${release_tag}"
            echo "title=${release_title}"
            echo 'notes<<EOF'
            if [ "${{ github.event_name }}" = 'workflow_dispatch' ]; then
              echo "Manual release containing the latest VS Code Insiders Flatpak and AppImage builds."
            else
              echo "Automated release containing the latest VS Code Insiders Flatpak and AppImage builds."
            fi
            echo
            echo "Insiders version: ${version}"
            echo "Insiders SHA: ${sha}"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Create or update GitHub release
        if: steps.insiders.outputs.should_build == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "${{ steps.release_meta.outputs.tag }}" >/dev/null 2>&1; then
            gh release upload "${{ steps.release_meta.outputs.tag }}" \
              release/vscode-flatpak-insider.flatpak \
              release/vscode-appimage-insiders.AppImage \
              --clobber
            gh release edit "${{ steps.release_meta.outputs.tag }}" \
              --title "${{ steps.release_meta.outputs.title }}" \
              --notes "${{ steps.release_meta.outputs.notes }}"
          else
            gh release create "${{ steps.release_meta.outputs.tag }}" \
              release/vscode-flatpak-insider.flatpak \
              release/vscode-appimage-insiders.AppImage \
              --title "${{ steps.release_meta.outputs.title }}" \
              --notes "${{ steps.release_meta.outputs.notes }}"
          fi

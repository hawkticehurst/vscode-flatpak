app-id: com.visualstudio.code
runtime: org.freedesktop.Platform
runtime-version: '23.08'
sdk: org.freedesktop.Sdk
base: org.electronjs.Electron2.BaseApp
base-version: '23.08'

command: code

finish-args:
  # Display / windowing
  - --socket=x11
  - --socket=wayland
  - --share=ipc

  # Audio
  - --socket=pulseaudio

  # Networking (extensions, marketplace, etc.)
  - --share=network

  # File access (loose on purpose for POC)
  - --filesystem=host

  # Needed by Electron / Chromium sandbox
  - --device=dri
  - --allow=devel
  - --talk-name=org.freedesktop.Flatpak

  # Ensure libraries can be found
  - --env=LD_LIBRARY_PATH=/app/lib

modules:
  - name: vscode
    buildsystem: simple

    build-commands:
      # Install VS Code files
      - mkdir -p /app/vscode
      - cp -r * /app/vscode

      # Install launcher script into PATH
      - install -Dm755 code.sh /app/bin/code

      # Ensure helper binaries are executable
      - chmod +x /app/vscode/code
      - chmod +x /app/vscode/chrome-sandbox || true

    sources:
      - type: archive
        url: https://update.code.visualstudio.com/latest/linux-x64/stable
        archive-type: tar-gzip
        sha256: PLACEHOLDER
      - type: file
        path: code.sh

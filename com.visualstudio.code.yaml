app-id: com.visualstudio.code
runtime: org.freedesktop.Platform
runtime-version: '23.08'
sdk: org.freedesktop.Sdk
command: code

modules:
  - name: vscode
    buildsystem: simple
    build-commands:
      - cp -r * /app/
    sources:
      - type: archive
        url: https://update.code.visualstudio.com/latest/linux-x64/stable
        filename: vscode.tar.gz
        sha256: PLACEHOLDER

finish-args:
  - --filesystem=home
  - --filesystem=/mnt
  - --filesystem=/media
  - --filesystem=host
  - --share=network
  - --socket=x11
  - --socket=wayland
  - --socket=pulseaudio
  - --device=all
  - --talk-name=org.freedesktop.Flatpak
